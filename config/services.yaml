parameters:
    # Базовый адрес проброшенного контейнера Ollama на хосте vm212
    ollama_base_url: 'http://192.168.1.212:11434'
    # Модель, которую будешь использовать (например, llama3.2 или gemma2)
    ollama_model: 'llama3:latest'    

services:
    # Базовые настройки для ВСЕХ сервисов приложения
    _defaults:
        autowire: true      # Автоматически внедряет зависимости (HttpClient, EntityManager)
        autoconfigure: true # Автоматически регистрирует команды и слушатели событий

    # Автоматическое сканирование и регистрация классов в src/
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Принудительная маркировка контроллеров, чтобы Symfony видела их атрибуты #[Route]
    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    # Явная передача параметра в конструктор вашего ИИ-сервиса
    App\Service\OllamaService:
        arguments:
            $ollamaBaseUrl: '%ollama_base_url%'
            $ollamaModel: '%ollama_model%'